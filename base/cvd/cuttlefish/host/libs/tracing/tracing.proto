edition = "2023";

package cuttlefish;

enum TraceEventType {
  TRACE_EVENT_TYPE_BEGIN = 0;
  TRACE_EVENT_TYPE_END = 1;
  TRACE_EVENT_TYPE_INSTANT = 2;
}

message TraceEventProto {
  TraceEventType type = 1;
  uint64 timestamp = 2;
  uint64 process_id = 3;
  string process_name = 4;
  uint64 thread_id = 5;
  string thread_name = 6;
  string name = 7;
  uint64 flow = 8;
}
